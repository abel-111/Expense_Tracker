<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
</head>
<body>
    <h1>Welcome {{ username }}</h1>
    <h2>Your Expenses</h2>
    <ul>
        {% for expense in expenses %}
            <li>{{ expense.category }}: ${{ expense.amount }}</li>
        {% endfor %}
    </ul>
    <p>Your expenses will appear here.</p>
</body>
</html>
