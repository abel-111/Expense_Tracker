{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">Edit Expense</h1>
        <form method="POST" action="/edit/{{ expense[0] }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="category" class="form-label">Category</label>
                <input type="text" id="category" name="category" value="{{ expense[1] }}" class="form-control">
            </div>
            <div class="mb-3">
                <label for="amount" class="form-label">Amount (₹)</label>
                <input type="number" id="amount" name="amount" value="{{ expense[2] }}" class="form-control" step="0.01">
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Date</label>
                <input type="date" id="date" name="date" value="{{ expense[3] }}" class="form-control">
            </div>
            <div class="mb-3">
                <label for="notes" class="form-label">Notes (optional)</label>
                <input type="text" id="notes" name="notes" value="{{ expense[4] }}" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
